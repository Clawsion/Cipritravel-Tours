<!-- Section.js com versão hard-coded para cache-busting.
     IMPORTANTE: quando editares assets/js/section.js, aumenta este número (ex: v=2 -> v=3) -->
<script src="assets/js/section.js?v=45" defer></script>
<script>
  function toggleMenu(){
    const menu = document.getElementById('mobile-menu');
    const hamburger = document.getElementById('hamburger');
    const isOpen = menu.classList.toggle('open');
    hamburger.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', isOpen);
  }
  function closeMenu(){
    document.getElementById('mobile-menu').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
    document.getElementById('hamburger').setAttribute('aria-expanded', 'false');
  }

  // Keyboard accessibility para o logo
  document.querySelector('.nav-logo').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      scrollToSection('home');
    }
  });
</script>
