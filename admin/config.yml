backend:
  name: github
  repo: Clawsion/Cipritravel-Tours
  branch: main
  base_url: https://cipritravel-auth.ludbek.workers.dev

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

locale: "pt"

logo_url: assets/images/logo.png

collections:
  # ============================================
  # PÁGINAS DO SITE
  # ============================================
  - name: "paginas"
    label: "📄 Páginas do Site"
    files:
      - name: "homepage"
        label: "🏠 Página Principal"
        file: "data/homepage.json"
        description: "Gerir todas as secções da página principal"
        fields:
          - name: "secoes"
            label: "Secções da Página"
            label_singular: "Secção"
            widget: "list"
            summary: "{{fields.ordem}}. {{fields.type}}"
            types:
              - name: "hero"
                label: "🦸 Hero / Banner Principal"
                widget: "object"
                summary: "Hero - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "hero" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 1, min: 1, max: 100 }
                  - { name: "id", label: "🆔 ID (âncora)", widget: "string", default: "home" }
                  - { name: "imagem", label: "🖼️ Imagem de Fundo", widget: "image" }
                  - { name: "bannerTexto", label: "🏷️ Texto do Banner (PT)", widget: "string", hint: "Texto que aparece acima do título" }
                  - { name: "bannerTextoEn", label: "🏷️ Texto do Banner (EN)", widget: "string", required: false }
                  - { name: "titulo", label: "📌 Título Principal (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título Principal (EN)", widget: "string", required: false }
                  - { name: "tituloDestaque", label: "✨ Texto em Destaque (PT)", widget: "string", hint: "Texto laranja destacado" }
                  - { name: "tituloDestaqueEn", label: "✨ Texto em Destaque (EN)", widget: "string", required: false }
                  - { name: "subtitulo", label: "📝 Subtítulo (PT)", widget: "string" }
                  - { name: "subtituloEn", label: "📝 Subtítulo (EN)", widget: "string", required: false }
                  - name: "botoes"
                    label: "🔘 Botões"
                    widget: "object"
                    fields:
                      - { name: "primario", label: "Texto Botão 1 (PT)", widget: "string" }
                      - { name: "primarioEn", label: "Texto Botão 1 (EN)", widget: "string", required: false }
                      - { name: "secundario", label: "Texto Botão 2 (PT)", widget: "string" }
                      - { name: "secundarioEn", label: "Texto Botão 2 (EN)", widget: "string", required: false }

              - name: "banner"
                label: "🎯 Banner Promocional"
                widget: "object"
                summary: "Banner - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "banner" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 2, min: 1, max: 100 }
                  - { name: "imagem", label: "🖼️ Imagem", widget: "image" }
                  - { name: "tag", label: "🏷️ Etiqueta (PT)", widget: "string", default: "Destaque" }
                  - { name: "tagEn", label: "🏷️ Etiqueta (EN)", widget: "string", required: false }
                  - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                  - { name: "subtitulo", label: "📝 Subtítulo (PT)", widget: "string" }
                  - { name: "subtituloEn", label: "📝 Subtítulo (EN)", widget: "string", required: false }
                  - { name: "textoBotao", label: "🔘 Texto do Botão (PT)", widget: "string", default: "Saber Mais" }
                  - { name: "textoBotaoEn", label: "🔘 Texto do Botão (EN)", widget: "string", required: false }
                  - { name: "modalId", label: "🆔 ID do Modal", widget: "string", hint: "ID do modal a abrir (ex: modal-barco)" }

              - name: "tours"
                label: "🚌 Secção de Excursões"
                widget: "object"
                summary: "Excursões - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "tours" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 3, min: 1, max: 100 }
                  - { name: "id", label: "🆔 ID (âncora)", widget: "string", default: "excursoes" }
                  - { name: "tag", label: "🏷️ Etiqueta (PT)", widget: "string", default: "Excursões" }
                  - { name: "tagEn", label: "🏷️ Etiqueta (EN)", widget: "string", required: false }
                  - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                  - { name: "descricao", label: "📝 Descrição (PT)", widget: "text" }
                  - { name: "descricaoEn", label: "📝 Descrição (EN)", widget: "text", required: false }
                  - { name: "subtitulo", label: "📝 Subtítulo (PT)", widget: "string" }
                  - { name: "subtituloEn", label: "📝 Subtítulo (EN)", widget: "string", required: false }
                  - { name: "ano", label: "📅 Ano", widget: "string", default: "2026" }
                  - name: "excursoes"
                    label: "Lista de Excursões"
                    widget: "list"
                    label_singular: "Excursão"
                    fields:
                      - { name: "id", label: "🆔 ID (slug)", widget: "string", hint: "Ex: geres, fatima-ortiga (sem espaços)" }
                      - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                      - { name: "imagem", label: "🖼️ Imagem", widget: "image" }
                      - { name: "nome", label: "📌 Nome (PT)", widget: "string" }
                      - { name: "nomeEn", label: "📌 Nome (EN)", widget: "string", required: false }
                      - name: "data"
                        label: "📅 Data"
                        widget: "object"
                        fields:
                          - { name: "dia", label: "Dia", widget: "string" }
                          - { name: "mes", label: "Mês", widget: "string" }
                      - { name: "duracao", label: "⏱️ Duração (PT)", widget: "string", hint: "ex: 1 Dia, 2 Dias" }
                      - { name: "duracaoEn", label: "⏱️ Duração (EN)", widget: "string", required: false }
                      - { name: "descricao", label: "📝 Descrição (PT)", widget: "text" }
                      - { name: "descricaoEn", label: "📝 Descrição (EN)", widget: "text", required: false }
                      - { name: "preco", label: "💰 Preço (EUR)", widget: "number", value_type: "float", min: 0 }
                      - { name: "corBadge", label: "🎨 Cor do Badge", widget: "select", options: ["laranja", "verde"], default: "laranja" }

              - name: "blog"
                label: "📝 Secção de Blog"
                widget: "object"
                summary: "Blog - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "blog" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 4, min: 1, max: 100 }
                  - { name: "id", label: "🆔 ID (âncora)", widget: "string", default: "blog" }
                  - { name: "tag", label: "🏷️ Etiqueta (PT)", widget: "string", default: "Blog" }
                  - { name: "tagEn", label: "🏷️ Etiqueta (EN)", widget: "string", required: false }
                  - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                  - { name: "descricao", label: "📝 Descrição (PT)", widget: "text" }
                  - { name: "descricaoEn", label: "📝 Descrição (EN)", widget: "text", required: false }
                  - name: "artigos"
                    label: "Lista de Artigos"
                    widget: "list"
                    label_singular: "Artigo"
                    fields:
                      - { name: "id", label: "🆔 ID (slug)", widget: "string", hint: "Ex: blog-1, blog-2 (sem espaços). É usado para o modal." }
                      - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                      - { name: "imagem", label: "🖼️ Imagem", widget: "image" }
                      - { name: "categoria", label: "📁 Categoria (PT)", widget: "select", options: ["Natureza", "Montanha", "Aventura", "Gastronomia", "Cultura", "Outro"] }
                      - { name: "categoriaEn", label: "📁 Categoria (EN)", widget: "string", required: false, hint: "Ex: Nature, Mountain, Adventure" }
                      - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                      - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                      - { name: "resumo", label: "📝 Resumo (PT)", widget: "text" }
                      - { name: "resumoEn", label: "📝 Resumo (EN)", widget: "text", required: false }
                      - { name: "data", label: "📅 Data", widget: "datetime" }
                      - { name: "conteudo", label: "📄 Conteúdo Completo (PT)", widget: "markdown" }
                      - { name: "conteudoEn", label: "📄 Conteúdo Completo (EN)", widget: "markdown", required: false }

              - name: "cards"
                label: "🃏 Secção de Cards"
                widget: "object"
                summary: "Cards - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "cards" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 5, min: 1, max: 100 }
                  - { name: "id", label: "🆔 ID (âncora)", widget: "string", default: "cards" }
                  - { name: "corFundo", label: "🎨 Cor de Fundo", widget: "select", options: ["branco", "cinza"], default: "branco" }
                  - { name: "tag", label: "🏷️ Etiqueta (PT)", widget: "string" }
                  - { name: "tagEn", label: "🏷️ Etiqueta (EN)", widget: "string", required: false }
                  - { name: "tagCor", label: "🎨 Cor da Etiqueta", widget: "select", options: ["laranja", "verde", "vermelho"], default: "verde" }
                  - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                  - { name: "descricao", label: "📝 Descrição (PT)", widget: "text" }
                  - { name: "descricaoEn", label: "📝 Descrição (EN)", widget: "text", required: false }
                  - name: "itens"
                    label: "Lista de Cards"
                    widget: "list"
                    label_singular: "Card"
                    fields:
                      - { name: "id", label: "🆔 ID (slug)", widget: "string", hint: "Ex: sust-1 (sem espaços). É usado para o modal." }
                      - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                      - { name: "imagem", label: "🖼️ Imagem", widget: "image" }
                      - { name: "categoria", label: "📁 Categoria (PT)", widget: "string" }
                      - { name: "categoriaEn", label: "📁 Categoria (EN)", widget: "string", required: false }
                      - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                      - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                      - { name: "resumo", label: "📝 Resumo (PT)", widget: "text" }
                      - { name: "resumoEn", label: "📝 Resumo (EN)", widget: "text", required: false }
                      - { name: "data", label: "📅 Data", widget: "datetime" }
                      - { name: "conteudo", label: "📄 Conteúdo Modal (PT)", widget: "markdown" }
                      - { name: "conteudoEn", label: "📄 Conteúdo Modal (EN)", widget: "markdown", required: false }

              - name: "texto-imagem"
                label: "📖 Texto e Imagem"
                widget: "object"
                summary: "Texto+Img - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "texto-imagem" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 6, min: 1, max: 100 }
                  - { name: "id", label: "🆔 ID (âncora)", widget: "string", default: "sobre" }
                  - { name: "corFundo", label: "🎨 Cor de Fundo", widget: "select", options: ["branco", "cinza"], default: "cinza" }
                  - { name: "tag", label: "🏷️ Etiqueta (PT)", widget: "string" }
                  - { name: "tagEn", label: "🏷️ Etiqueta (EN)", widget: "string", required: false }
                  - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                  - { name: "texto1", label: "📝 Texto Principal (PT)", widget: "markdown" }
                  - { name: "texto1En", label: "📝 Texto Principal (EN)", widget: "markdown", required: false }
                  - { name: "citacao", label: "💬 Citação em Destaque (PT)", widget: "string" }
                  - { name: "citacaoEn", label: "💬 Citação em Destaque (EN)", widget: "string", required: false }
                  - { name: "texto2", label: "📝 Texto Secundário (PT)", widget: "markdown" }
                  - { name: "texto2En", label: "📝 Texto Secundário (EN)", widget: "markdown", required: false }
                  - { name: "imagem", label: "🖼️ Imagem", widget: "image" }
                  - { name: "posicaoImagem", label: "📍 Posição da Imagem", widget: "select", options: ["esquerda", "direita"], default: "direita" }
                  - { name: "textoBotao", label: "🔘 Texto Botão (PT)", widget: "string", required: false }
                  - { name: "textoBotaoEn", label: "🔘 Texto Botão (EN)", widget: "string", required: false }
                  - { name: "ancoraBotao", label: "🔗 Link/Âncora do Botão", widget: "string", required: false }

              - name: "features"
                label: "⭐ Secção de Features"
                widget: "object"
                summary: "Features - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "features" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 7, min: 1, max: 100 }
                  - { name: "id", label: "🆔 ID (âncora)", widget: "string", default: "features" }
                  - { name: "corFundo", label: "🎨 Cor de Fundo", widget: "select", options: ["branco", "cinza"], default: "branco" }
                  - { name: "tag", label: "🏷️ Etiqueta (PT)", widget: "string" }
                  - { name: "tagEn", label: "🏷️ Etiqueta (EN)", widget: "string", required: false }
                  - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                  - name: "itens"
                    label: "Lista de Features"
                    widget: "list"
                    label_singular: "Feature"
                    max: 10
                    fields:
                      - { name: "icone", label: "🎨 Ícone (emoji)", widget: "string", hint: "ex: 🛡️, 🚌, 💰, ✨, 🌿" }
                      - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                      - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                      - { name: "descricao", label: "📝 Descrição (PT)", widget: "text" }
                      - { name: "descricaoEn", label: "📝 Descrição (EN)", widget: "text", required: false }

              - name: "cta"
                label: "📣 Call-to-Action"
                widget: "object"
                summary: "CTA - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "cta" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 8, min: 1, max: 100 }
                  - { name: "corFundo", label: "🎨 Cor de Fundo", widget: "select", options: ["verde", "laranja", "azul"], default: "verde" }
                  - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                  - { name: "descricao", label: "📝 Descrição (PT)", widget: "text" }
                  - { name: "descricaoEn", label: "📝 Descrição (EN)", widget: "text", required: false }
                  - { name: "tipo", label: "Tipo de CTA", widget: "select", options: ["newsletter", "botao", "ambos"], default: "newsletter" }
                  - { name: "textoBotao", label: "🔘 Texto Botão (PT)", widget: "string", required: false }
                  - { name: "textoBotaoEn", label: "🔘 Texto Botão (EN)", widget: "string", required: false }
                  - { name: "placeholder", label: "📝 Placeholder Input (PT)", widget: "string", required: false }
                  - { name: "placeholderEn", label: "📝 Placeholder Input (EN)", widget: "string", required: false }

              - name: "formulario"
                label: "📬 Formulário de Contacto"
                widget: "object"
                summary: "Formulário - {{fields.titulo}}"
                fields:
                  - { name: "type", widget: "hidden", default: "formulario" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 9, min: 1, max: 100 }
                  - { name: "id", label: "🆔 ID (âncora)", widget: "string", default: "contactos" }
                  - { name: "corFundo", label: "🎨 Cor de Fundo", widget: "select", options: ["branco", "cinza"], default: "cinza" }
                  - { name: "tag", label: "🏷️ Etiqueta (PT)", widget: "string" }
                  - { name: "tagEn", label: "🏷️ Etiqueta (EN)", widget: "string", required: false }
                  - { name: "titulo", label: "📌 Título (PT)", widget: "string" }
                  - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
                  - { name: "descricao", label: "📝 Descrição (PT)", widget: "text" }
                  - { name: "descricaoEn", label: "📝 Descrição (EN)", widget: "text", required: false }
                  - name: "infoContacto"
                    label: "📞 Informações de Contacto"
                    widget: "object"
                    fields:
                      - { name: "telefone", label: "📱 Telefone", widget: "string" }
                      - { name: "email", label: "📧 Email", widget: "string" }
                      - { name: "morada", label: "📍 Morada", widget: "text" }
                  - { name: "mapaEmbed", label: "🗺️ URL do Mapa (iframe)", widget: "text", required: false }
                  - { name: "mostrarMapa", label: "🗺️ Mostrar Mapa", widget: "boolean", default: true }

              - name: "spacer"
                label: "📏 Espaçador"
                widget: "object"
                summary: "Espaçador - {{fields.altura}}px"
                fields:
                  - { name: "type", widget: "hidden", default: "spacer" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 10, min: 1, max: 100 }
                  - { name: "altura", label: "📏 Altura (px)", widget: "number", default: 60, min: 0, max: 500 }
                  - { name: "corFundo", label: "🎨 Cor de Fundo", widget: "select", options: ["transparente", "cinza", "branco"], default: "transparente" }

              - name: "html"
                label: "🔧 HTML Personalizado"
                widget: "object"
                summary: "HTML Custom"
                fields:
                  - { name: "type", widget: "hidden", default: "html" }
                  - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
                  - { name: "ordem", label: "🔢 Ordem", widget: "number", default: 11, min: 1, max: 100 }
                  - { name: "html", label: "📄 Código HTML", widget: "code", default_language: "html" }
                  - { name: "css", label: "🎨 CSS (opcional)", widget: "code", default_language: "css", required: false }

  # ============================================
  # NAVEGAÇÃO
  # ============================================
  - name: "navegacao"
    label: "🧭 Navegação"
    files:
      - name: "menu"
        label: "Menu Principal"
        file: "data/menu.json"
        fields:
          - { name: "logo", label: "🖼️ Logo", widget: "image" }
          - name: "itens"
            label: "Itens do Menu"
            widget: "list"
            fields:
              - { name: "texto", label: "📝 Texto (PT)", widget: "string" }
              - { name: "textoEn", label: "📝 Texto (EN)", widget: "string", required: false }
              - { name: "ancora", label: "🔗 Âncora/Link", widget: "string" }
              - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }

  # ============================================
  # RODAPÉ
  # ============================================
  - name: "footer"
    label: "🔻 Rodapé"
    files:
      - name: "footer"
        label: "Rodapé"
        file: "data/footer.json"
        fields:
          - { name: "logo", label: "🖼️ Logo", widget: "image" }
          - { name: "descricao", label: "📝 Descrição (PT)", widget: "string" }
          - { name: "descricaoEn", label: "📝 Descrição (EN)", widget: "string", required: false }
          - { name: "copyright", label: "©️ Copyright (PT)", widget: "string" }
          - { name: "copyrightEn", label: "©️ Copyright (EN)", widget: "string", required: false }
          - name: "contactos"
            label: "📞 Contactos"
            widget: "object"
            fields:
              - { name: "telefone", label: "📱 Telefone", widget: "string" }
              - { name: "email", label: "📧 Email", widget: "string" }
              - { name: "morada", label: "📍 Morada", widget: "text" }
          - name: "linksRapidos"
            label: "🔗 Links Rápidos"
            widget: "list"
            summary: "{{fields.texto}}"
            fields:
              - { name: "texto", label: "📝 Texto (PT)", widget: "string" }
              - { name: "textoEn", label: "📝 Texto (EN)", widget: "string", required: false }
              - { name: "ancora", label: "🔗 Âncora", widget: "string" }
          - name: "redesSociais"
            label: "🌐 Redes Sociais"
            widget: "list"
            summary: "{{fields.nome}}"
            hint: "Adicione ou edite as suas redes sociais."
            fields:
              - { name: "nome", label: "📱 Nome da Rede", widget: "string", hint: "Ex: Facebook, Instagram, LinkedIn, YouTube" }
              - { name: "url", label: "🔗 URL do Perfil", widget: "string", hint: "Link completo para o seu perfil" }
              - { name: "icone", label: "🎨 Código do Ícone", widget: "string", hint: "f=Facebook, in=LinkedIn, ▶=YouTube, 📷=Instagram" }
              - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
          - { name: "whatsapp", label: "📱 Número WhatsApp", widget: "string" }
          - { name: "whatsappMensagem", label: "💬 Mensagem WhatsApp (PT)", widget: "string" }
          - { name: "whatsappMensagemEn", label: "💬 Mensagem WhatsApp (EN)", widget: "string", required: false }

  # ============================================
  # MODAIS (POPUPS)
  # ============================================
  - name: "modais"
    label: "🪟 Modais (Popups)"
    files:
      - name: "modais"
        label: "Modais"
        file: "data/modais.json"
        fields:
          - name: "lista"
            label: "Lista de Modais"
            widget: "list"
            label_singular: "Modal"
            summary: "{{fields.tipo}} — {{fields.titulo}}"
            fields:
              - { name: "id", label: "🆔 ID", widget: "string", required: false, hint: "Ex: modal-barco, modal-reserva, modal-blog-1" }
              - { name: "tipo", label: "📋 Tipo de Modal", widget: "select", options: ["conteudo", "formulario"], required: false, default: "conteudo", hint: "'conteudo' para modais de informação, 'formulario' para formulários de reserva" }
              - { name: "ativo", label: "✅ Ativo", widget: "boolean", default: true }
              - { name: "titulo", label: "📌 Título (PT)", widget: "string", required: false }
              - { name: "tituloEn", label: "📌 Título (EN)", widget: "string", required: false }
              - { name: "subtitulo", label: "📝 Subtítulo (PT)", widget: "string", required: false, hint: "Ex: Rio Caldo · Barragem da Caniçada" }
              - { name: "subtituloEn", label: "📝 Subtítulo (EN)", widget: "string", required: false }
              - { name: "imagem", label: "🖼️ Imagem", widget: "image", required: false }
              - { name: "conteudo", label: "📄 Conteúdo (PT)", widget: "markdown", required: false }
              - { name: "conteudoEn", label: "📄 Conteúdo (EN)", widget: "markdown", required: false }
              - { name: "tourId", label: "🚌 ID da Excursão", widget: "string", required: false, hint: "ID da excursão para o botão 'Reservar'. Ex: geres, fatima-ortiga" }
              - name: "incluidos"
                label: "✅ Itens Incluídos (PT)"
                widget: "list"
                required: false
                field: { name: "item", label: "Item", widget: "string" }
              - name: "incluidosEn"
                label: "✅ Itens Incluídos (EN)"
                widget: "list"
                required: false
                field: { name: "item", label: "Item", widget: "string" }
              - { name: "textoBotao", label: "🔘 Texto Botão (PT)", widget: "string", required: false }
              - { name: "textoBotaoEn", label: "🔘 Texto Botão (EN)", widget: "string", required: false }
              - name: "campos"
                label: "📝 Campos do Formulário"
                widget: "list"
                required: false
                hint: "Apenas para modais do tipo 'formulario'. Define os campos do formulário."
                fields:
                  - { name: "id", label: "🆔 ID do Campo", widget: "string" }
                  - { name: "label", label: "📌 Label (PT)", widget: "string" }
                  - { name: "labelEn", label: "📌 Label (EN)", widget: "string", required: false }
                  - { name: "tipo", label: "📋 Tipo", widget: "select", options: ["text", "email", "tel", "select", "number", "textarea"] }
                  - { name: "obrigatorio", label: "✅ Obrigatório", widget: "boolean", default: false }
                  - { name: "placeholder", label: "📝 Placeholder (PT)", widget: "string", required: false }
                  - { name: "placeholderEn", label: "📝 Placeholder (EN)", widget: "string", required: false }

  # ============================================
  # CONFIGURAÇÕES
  # ============================================
  - name: "configuracoes"
    label: "⚙️ Configurações"
    files:
      - name: "configuracoes"
        label: "Configurações Gerais"
        file: "data/config.json"
        fields:
          - { name: "web3formsKey", label: "🔑 Web3Forms Access Key", widget: "string" }
          - { name: "siteNome", label: "📌 Nome do Site", widget: "string" }
          - { name: "siteUrl", label: "🌐 URL do Site", widget: "string" }
          - { name: "langDefault", label: "🌍 Idioma Padrão", widget: "select", options: ["pt", "en"] }
          - name: "langSuportadas"
            label: "🌍 Idiomas Suportados"
            widget: "list"
            field: { name: "lang", label: "Idioma", widget: "string" }
          - name: "seo"
            label: "🔍 SEO"
            widget: "object"
            fields:
              - { name: "tituloPt", label: "Título (PT)", widget: "string" }
              - { name: "tituloEn", label: "Título (EN)", widget: "string" }
              - { name: "descricaoPt", label: "Meta Descrição (PT)", widget: "text" }
              - { name: "descricaoEn", label: "Meta Descrição (EN)", widget: "text" }
              - { name: "keywords", label: "Keywords", widget: "string" }
          - name: "contactos"
            label: "📞 Contactos"
            widget: "object"
            fields:
              - { name: "telefone", label: "📱 Telefone", widget: "string" }
              - { name: "email", label: "📧 Email", widget: "string" }
              - { name: "morada", label: "📍 Morada", widget: "text" }
              - { name: "whatsapp", label: "📱 WhatsApp", widget: "string" }
