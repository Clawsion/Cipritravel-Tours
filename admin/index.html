<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Cipritravel Tours - Painel de Administração</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { margin: 0; background: #0f172a; }
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #fff;
      font-family: 'Poppins', sans-serif;
    }
    .loading-screen h1 { margin-bottom: 10px; }
    .loading-screen p { opacity: 0.7; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #2d7a3a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <h1>Cipritravel CMS</h1>
    <p>A carregar painel de administração...</p>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js"></script>
  <script>
    if (window.CMS) {
      document.getElementById('loading').style.display = 'none';
    }
    CMS.registerPreviewStyle('/assets/css/styles.css');
  </script>
</body>
</html>
